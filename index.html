<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Peach Project – Trainings-App</title>
<meta name="theme-color" content="#1a1418"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1418;color:#fff;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#3a2a35;border-radius:4px;}
input,textarea,button{font-family:inherit;}
button{cursor:pointer;}
#header{background:linear-gradient(160deg,#2e1a28 0%,#1a1418 100%);padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-emoji{width:36px;height:36px;image-rendering:pixelated;}
.logo-title{font-weight:800;font-size:20px;letter-spacing:-0.5px;}
.logo-sub{color:#C8729A;font-size:12px;font-weight:500;}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tab-btn{padding:6px 13px;border-radius:8px;border:none;font-size:12px;font-weight:600;transition:background .15s,color .15s;}
.tab-btn.active{background:#C8729A;color:#fff;}
.tab-btn.inactive{background:rgba(255,255,255,0.08);color:#888;}
.plan-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#777;}
.plan-btn.active{border-color:#C8729A;background:rgba(200,114,154,0.13);color:#C8729A;}
.cycle-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#777;}
.cycle-btn.active{border-color:#B88CC0;background:rgba(184,140,192,0.13);color:#B88CC0;}
.week-nav{margin-left:auto;display:flex;align-items:center;gap:6px;}
.week-arrow{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;}
.week-label{font-size:14px;font-weight:700;min-width:62px;text-align:center;}
#content{padding:16px 16px 40px;max-width:680px;margin:0 auto;}
.week-progress{background:rgba(255,255,255,0.04);border-radius:12px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.wp-bar-wrap{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.10);overflow:hidden;}
.wp-bar{height:100%;border-radius:3px;transition:width .5s;}
.day-card{background:rgba(255,255,255,0.04);border-radius:16px;margin-bottom:12px;overflow:visible;border:1px solid rgba(255,255,255,0.08);}
.day-header{width:100%;background:none;border:none;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;color:#fff;text-align:left;}
.day-body{padding:0 14px 14px;}
.ex-row{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.ex-row-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.cat-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase;}
.picker-wrap{flex:1;min-width:140px;position:relative;}
.pick-btn{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#666;font-size:13px;padding:5px 10px 5px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px;text-align:left;}
.pick-btn.has-val{color:#fff;}
.pick-btn-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.pick-btn-arr{color:#666;font-size:10px;flex-shrink:0;}
.dropdown{position:absolute;left:0;right:0;z-index:200;background:#2a1e26;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.7);overflow:hidden;}
.drop-search{padding:8px 8px 4px;}
.drop-search input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;font-size:12px;padding:5px 8px;outline:none;}
.drop-list{max-height:220px;overflow-y:auto;}
.drop-opt{padding:8px 12px;font-size:13px;color:#ddd;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);}
.drop-opt:hover{background:rgba(255,255,255,0.07);}
.drop-opt.sel{font-weight:600;}
.drop-empty-opt{color:#666;border-bottom:1px solid rgba(255,255,255,0.06);}
.drop-no-results{padding:10px 12px;color:#555;font-size:12px;}
.pbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;white-space:nowrap;}
.ex-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.sets-info{color:#777;font-size:12px;}
.w-wrap{display:flex;align-items:center;gap:6px;}
.w-label{color:#777;font-size:12px;}
.w-input{width:62px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:6px;color:#fff;font-size:13px;font-weight:600;padding:4px 6px;outline:none;}
.reps-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rep-col{display:flex;flex-direction:column;align-items:center;gap:2px;}
.rep-lbl{color:#555;font-size:10px;}
.rep-inp{width:38px;text-align:center;background:rgba(255,255,255,0.07);border-radius:6px;color:#fff;font-size:13px;font-weight:600;padding:4px 2px;outline:none;}
.rep-prev{color:#555;font-size:10px;}
.add-set-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px dashed rgba(255,255,255,0.2);color:#666;font-size:16px;display:flex;align-items:center;justify-content:center;}
.phint{margin-top:8px;font-size:11px;color:#666;}
.tip-toggle{background:none;border:none;color:#666;font-size:11px;font-weight:600;padding:2px 0;display:flex;align-items:center;gap:5px;margin-top:6px;}
.tip-toggle.open{color:#C8729A;}
.tip-i{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid #555;font-size:9px;font-weight:800;}
.tip-toggle.open .tip-i{border-color:#C8729A;color:#C8729A;}
.tip-custom{color:#B88CC0;font-size:10px;}
.tip-panel{margin-top:6px;background:rgba(255,255,255,0.05);border-radius:10px;border:1px solid rgba(255,255,255,0.10);padding:10px 12px;}
.tip-text{color:#bbb;font-size:12px;line-height:1.7;white-space:pre-wrap;}
.tip-edit-btn{margin-top:8px;background:none;border:none;color:#666;font-size:11px;padding:2px 0;}
.tip-ta{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:7px;color:#ddd;font-size:12px;line-height:1.6;padding:7px 9px;resize:vertical;outline:none;}
.tip-acts{display:flex;gap:8px;margin-top:7px;}
.tip-save{background:#C8729A;border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;}
.tip-cancel{background:rgba(255,255,255,0.08);border:none;border-radius:6px;color:#aaa;font-size:11px;padding:4px 10px;}
.tip-reset{background:none;border:none;color:#666;font-size:11px;padding:4px 8px;margin-left:auto;}
.ov-title{font-size:18px;font-weight:700;margin-bottom:6px;color:#C8729A;}
.ov-sub{color:#777;font-size:13px;margin-bottom:20px;line-height:1.6;}
.ov-day{margin-bottom:24px;}
.ov-day-lbl{font-weight:700;font-size:13px;color:#B88CC0;margin-bottom:10px;}
.ov-ex{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.ov-bars{display:flex;align-items:flex-end;gap:3px;height:40px;}
.ov-bar{flex:1;border-radius:2px 2px 0 0;transition:height .3s;min-height:2px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div id="header">
  <div class="header-top">

    <div style="display:flex;gap:6px;">

  <div class="controls">

      <button class="cycle-btn active" id="cycle-cycle1" onclick="setCycle('cycle1')">Zyklus 1</button>

      <button class="cycle-btn" id="cycle-cycle3" onclick="setCycle('cycle3')">Zyklus 3</button>
    </div>
    <div class="week-nav">
      <button class="week-arrow" onclick="changeWeek(-1)">&#8249;</button>

</div>
<div id="content">
  <div id="view-training"></div>
  <div id="view-overview" class="hidden"></div>
</div>

<script>
const EXERCISES={
"Glute Max":["Hip Thrusts Langhantel","Hip Thrust Kurzhantel","Hip Thrusts Multipresse","Hip Thrust Maschine","Glute Bridge Langhantel","Glute Bridge Kurzhantel","Glute Bridge Multipresse","Kabel Kickback Stehend","Kabel Kickback Flachbank","Kabel Kickback Schrägbank","Kabel Kickback Liegend","Kickback Multipresse","Kickback Maschine"],
"Glute Med":["Kabel Abduktion Stehend","Kabel Abduktion Liegend","Kabel Abduktion Schrägbank","Abduktionsmaschine","Pelvic Drop","Abduktionsmaschine stehend","Fire Hydrants Kabel"],
"Glute & Quad":["Low Bar Squat","Beinpresse","Step Ups","Split Squat Kurzhantel","Split Squat Langhantel","Split Squat Multipresse","Hack Squat","Reverse Lunge"],
"Glute & Hams":["RDL Langhantel","RDL Kurzhanteln","Glute Hyperextensions","Reverse Hack RDL","Good Mornings","Single-Leg RDL","Nordic Curls","Leg Curl (Maschine)"],
"Rücken":["LH Rudern","KH Rudern","KH Rudern (breit)","Rudern Kabel (eng)","Rudern Kabel (breit)","Rudermaschine (neutral)","Rudermaschine (breit)","Latzug (eng)","Latzug (breit)","Überzug am Kabel","T Bar Rudern (neutral)","T Bar Rudern (breit)","Assistierter Klimmzug (eng)","Assistierter Klimmzug (breit)","Face Pull Kabel","Straight-Arm Pulldown","Einarmiger Latzug Kabel"],
"Brust":["LH Bankdrücken","KH Bankdrücken","Bankdrücken Multipresse","LH Schrägbankdrücken","KH Schrägbankdrücken","Schrägbankdrücken Multipresse","Brustpresse","Butterfly Maschine","Flys von oben Kabel","Flys von unten Kabel","Flachbank KH Flys","Schrägbank KH Flys"],
"Schultern":["KH Seitheben","Vorgebeugtes KH Seitheben","Seithebemaschine","Seitheben Kabel","Vorgebeugtes Seitheben Kabel","LH Überkopfdrücken","KH Überkopfdrücken","Überkopfmaschine","Butterfly Reverse Maschine","Butterfly Reverse Kabel","Upright Row Kabel","Arnold Press","Einarmiges Überkopfdrücken Kabel"],
"Bizeps":["SZ Curls","LH Curls","KH Curls","Kabel Curls","KH Hammer Curls","SZ Preacher Curls","KH Preacher Curls","Bizeps Maschine","Konzentrations Curls","Spinne Curls","Kabel Curls einarmig","Reverse Curls"],
"Trizeps":["SZ Skullcrusher","Enges Bankdrücken","Pushdown Kabel","Pushdown Kabel einarmig","SZ Überkopf Tri. Drücken","KH Überkopf Tri. Drücken","Kabel Überkopf Tri. Drücken","Dips Maschine","Trizeps Maschine","KH Kickback Trizeps"],
"Bauch":["Crunches","Crunches am Kabelzug","Bauch Maschine","Beinheben (Liegend)","Beinheben (Hängend)","Reverse Crunch","Dead Bug","Ab Rollout","Pallof Press","Hollow Body Hold"]
};
const TIPS={
"Hip Thrusts Langhantel":"Stange auf Hüftbeugern auflegen, Schulterblätter auf Bank. Hüfte vollständig strecken, Gesäß oben kurz anspannen. Kinn zur Brust, Blick nach oben.",
"Hip Thrust Kurzhantel":"KH auf Hüfte halten. Gleicher Bewegungsablauf wie LH-Variante. Für isolierte Anspannung oben kurz halten.",
"Hip Thrusts Multipresse":"Stange in Multipresse auf Hüfte. Fußposition ausprobieren – etwas weiter vorne betont mehr den Po.",
"Hip Thrust Maschine":"Rücken fest an die Maschine. Hüfte vollständig durchstrecken, keine Hohlkreuz-Überkompensation.",
"Glute Bridge Langhantel":"Wie Hip Thrust, aber flach auf dem Boden liegend. Schulterblätter am Boden. Hüfte vollständig strecken.",
"Glute Bridge Kurzhantel":"KH auf Hüfte. Flach auf dem Boden, Hüfte hochdrücken bis volle Streckung.",
"Glute Bridge Multipresse":"Boden-Variante in der Multipresse. Fußstellung leicht erhöht möglich für mehr Range.",
"Kabel Kickback Stehend":"Gewicht am Fußgelenk. Oberkörper leicht vorgebeugt, Hüfte stabil. Bein nach hinten-oben, Gesäß anspannen – nicht schwingen.",
"Kabel Kickback Flachbank":"Auf Flachbank kniend, Gewicht am Fußgelenk. Bein nach hinten-oben strecken, oben kurz halten.",
"Kabel Kickback Schrägbank":"Oberkörper auf Schrägbank gestützt. Gibt mehr Stabilität für isolierte Ausführung.",
"Kabel Kickback Liegend":"Auf dem Bauch liegend, Kabel am Fußgelenk. Bein vom Boden abheben und nach oben-hinten strecken. Hüfte bleibt am Boden – isolierte Glute-Max-Kontraktion.",
"Kickback Multipresse":"Multipresse ermöglicht geführte Bewegung. Auf alle vier stützen, Bein nach hinten durchstrecken.",
"Kickback Maschine":"Maschinenführung nutzen. Bein nach hinten drücken, oben 1 Sek. halten, langsam zurück.",
"Kabel Abduktion Stehend":"Standbein leicht gebeugt. Bein seitlich hochführen, Hüfte nicht mitrotieren. Oberkörper stabil halten.",
"Kabel Abduktion Liegend":"Auf der Seite liegend, Kabel am unteren Fußgelenk. Bein seitlich heben, kurz halten.",
"Kabel Abduktion Schrägbank":"Auf Schrägbank gestützt für stabilen Oberkörper. Bein seitlich führen.",
"Abduktionsmaschine":"Sitzend, Knie nach außen drücken. Langsam zurück – exzentrische Phase nutzen.",
"Pelvic Drop":"Einbeinig auf einer Stufe stehen. Hüfte der Hängeseite langsam absinken lassen, dann Glute Med anspannen und anheben.",
"Abduktionsmaschine stehend":"Stehend an der Maschine. Mehr Glute-Med-Aktivierung als sitzend. Standbein stabil, Oberkörper nicht wegkippen.",
"Fire Hydrants Kabel":"Auf allen Vieren, Kabel am Knie/Fußgelenk. Bein seitlich-nach-oben führen wie ein Feuerhydrant. Hüfte nicht mitdrehen.",
"Low Bar Squat":"⚠️ Für Po-Fokus: Füße weit auseinander, Zehen leicht nach außen, Fersen ggf. erhöht. Tief absenken, Knie über Zehen. Enger Stand + volle Tiefe = mehr Quad – bei Ziel schmale Beine vermeiden!",
"Beinpresse":"⚠️ Für Po-Fokus: Füße hoch und weit auf der Plattform, Knie weit auseinander. Enge tiefe Fußstellung = mehr Quad. Bei Ziel schmale Beine: lieber Reverse Lunge oder Split Squat wählen.",
"Step Ups":"Hohe Box (mind. Kniehöhe) für maximale Glute-Aktivierung. Ferse fest aufstellen, durch die Ferse drücken.",
"Split Squat Kurzhantel":"✅ Gute Wahl bei Ziel schmale Beine. Hinterer Fuß auf Bank oder am Boden. Oberkörper leicht vorgebeugt – mehr Po, weniger Quad.",
"Split Squat Langhantel":"✅ Gute Wahl bei Ziel schmale Beine. Stange auf Schultern, Oberkörper leicht vorgebeugt – mehr Glute-Aktivierung als aufrecht.",
"Split Squat Multipresse":"✅ Gute Wahl bei Ziel schmale Beine. Geführte Variante, mehr Stabilität. Oberkörper leicht vorgebeugt halten.",
"Hack Squat":"⚠️ Für Po-Fokus: Füße weit oben auf der Plattform, weit auseinander, tief absenken. Enger Stand + flache Fußstellung = dominanter Quad – bei Ziel schmale Beine nur mit weitem Stand.",
"Reverse Lunge":"✅ Beste Wahl bei Ziel schmale Beine. Weniger Quad-dominant als alle anderen Varianten. Schritt weit nach hinten, durch Ferse drücken.",
"RDL Langhantel":"Füße hüftbreit, Stange nah am Körper. Hüfte nach hinten schieben, Rücken gerade. Dehnung in den Hamstrings spüren, dann durch Gesäß nach oben.",
"RDL Kurzhanteln":"Gleiche Technik wie LH-RDL. KH vor dem Körper, nah an den Beinen entlangführen.",
"Glute Hyperextensions":"An der Hyperextensionsbank, Hüfte an der Auflagekante. Oberkörper absenken, dann durch Gesäß strecken – nicht mit dem Rücken.",
"Reverse Hack RDL":"Rückwärts in der Hack-Squat-Maschine. Hüfte-Hinge-Bewegung – stark auf hintere Kette.",
"Good Mornings":"Stange auf den Schultern. Hüfte nach hinten schieben, Rücken neutral. Hamstring-Dehnung halten, dann zurück.",
"Single-Leg RDL":"Einbeinig, hinteres Bein gestreckt nach hinten heben. Mehr Glute-Aktivierung als beidbeinig. Hüfte stabil halten – nicht rotieren.",
"Leg Curl (Maschine)":"Liegend oder sitzend. Isolierter Hamstring-Fokus – gibt der Rückseite des Oberschenkels die runde Form direkt unterhalb des Pos. Langsam ablassen, volle Streckung unten nutzen. Fersen zur Gesäßgegend ziehen, kurz halten.",
"Nordic Curls":"Knie auf gepolsterter Unterlage, Füße fixiert. Oberkörper langsam nach vorne fallen lassen – exzentrische Hamstring-Arbeit. Fortgeschrittene Übung.",
"LH Rudern":"Oberkörper ca. 45° vorgebeugt. Stange zum Bauch ziehen, Ellbogen nah am Körper.",
"KH Rudern":"Einarmig auf Bank gestützt. KH zum Hüftknochen ziehen, Schulterblatt einziehen.",
"KH Rudern (breit)":"Ellbogen weiter außen – betont oberen Rücken und hintere Schulter.",
"Rudern Kabel (eng)":"Sitzend, enges Griffstück. Zur Bauchgegend ziehen, Schulterblätter zusammenziehen.",
"Rudern Kabel (breit)":"Breites Griffstück. Ellbogen seitlich – mehr Latissimus.",
"Rudermaschine (neutral)":"Neutraler Griff. Rücken aufrecht, nicht mit dem Oberkörper schwingen.",
"Rudermaschine (breit)":"Breiter Griff. Schulterblätter aktiv zusammenziehen am Ende.",
"Latzug (eng)":"Enger Parallelgriff. Zur Brust ziehen, Ellbogen nach unten-hinten.",
"Latzug (breit)":"Breiter Overhand-Griff. Zur Brust ziehen, Latissimus aktiv.",
"Überzug am Kabel":"Liegend oder stehend vorgebeugt. Gerade Arme, Lat zieht den Arm nach unten.",
"T Bar Rudern (neutral)":"Neutraler Griff. Brust auf Pad, Stange zum Bauch ziehen.",
"T Bar Rudern (breit)":"Breiter Griff. Mehr oberer Rücken.",
"Assistierter Klimmzug (eng)":"Enger Parallelgriff. Maschine unterstützt. Schulterblätter zuerst einziehen, dann Ellbogen.",
"Assistierter Klimmzug (breit)":"Breiter Griff. Lat-Fokus. Körper nicht schwingen.",
"Face Pull Kabel":"Kabel auf Kopfhöhe, Seil-Aufsatz. Zur Stirn ziehen, Ellbogen hoch. Betont hintere Schulter und oberen Rücken – gut für Haltung.",
"Straight-Arm Pulldown":"Kabel oben, Arme gestreckt. Lat nach unten ziehen bis Oberschenkel. Isolierter Lat ohne Bizeps.",
"Einarmiger Latzug Kabel":"Einarmig am Kabel. Mehr Range und Rotation möglich. Lat gut einziehen am Ende.",
"LH Bankdrücken":"Schulterbreiter Griff. Stange zur unteren Brust, Ellbogen ca. 75° vom Körper.",
"KH Bankdrücken":"Ermöglicht mehr Bewegungsfreiheit. KH am Ende leicht zusammenführen.",
"Bankdrücken Multipresse":"Geführte Bewegung. Griffposition anpassen – leicht schräg für natürlichere Bewegung.",

function mk(c,w,d,e){return c+'__w'+w+'__d'+d+'__e'+e}
function mkt(c,w,d,e){return 'tip__'+c+'__w'+w+'__d'+d+'__e'+e}
function plan(){return S.pt===3?P3:P4}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rcol(v,r){if(v===''||v==null)return'#555';const n=parseInt(v);if(isNaN(n))return'#555';if(n>=r[1])return'#7bc47a';if(n>=r[0])return'#e8b860';return'#d86868'}
function prog(cr,pr,cw,pw){
  if(!pr||!pr.length)return null;
  if((parseFloat(cw)||0)>(parseFloat(pw)||0))return'w';
  let imp=false;
  for(let i=0;i<Math.max(cr.length,pr.length);i++){const c=parseInt(cr[i])||0,p=parseInt(pr[i])||0;if(c>p)imp=true;if(c<p)return'd'}
  return imp?'r':'s'
}
function pbadge(p){
  if(!p)return'';
  const m={w:['↑ Gewicht','#7bc47a'],r:['↑ Reps','#7aafdf'],s:['= Gleich','#e8b860'],d:['↓ Weniger','#d86868']};
  const[l,c]=m[p]||[];if(!l)return'';
  return'<span class="pbadge" style="background:'+c+'22;border:1px solid '+c+';color:'+c+'">'+l+'</span>'
}

      const cur=S.data[k]||{},prv=S.data[pk]||{};
      if(!prv.weight&&!(prv.reps||[]).some(Boolean))return;
      tot++;const p=prog(cur.reps||[],prv.reps||[],cur.weight,prv.weight);
      if(p==='w'||p==='r')imp++;
    }));
    if(tot>0){const pct=Math.round(imp/tot*100),bc=pct>=70?'#7bc47a':pct>=40?'#e8b860':'#d86868';

function autoExtraSets(di,ei,baseSets){
  if(S.week<4)return 0;
  let streak=0;
  for(let w=S.week-1;w>=Math.max(1,S.week-3);w--){
    const k=mk(S.cy,w,di,ei),pk=mk(S.cy,w-1,di,ei);
    const cur=S.data[k]||{},prv=S.data[pk]||{};
    if(!prv.weight&&!(prv.reps||[]).some(Boolean))break;
    const st=prog(cur.reps||[],prv.reps||[],cur.weight,prv.weight);
    if(st==='s'||st==='d')streak++;else break;
  }
  return streak>=3?1:0;
}

function renderEx(ex,ei,di){
  const k=mk(S.cy,S.week,di,ei),pk=S.week>1?mk(S.cy,S.week-1,di,ei):null;
  const rawCur=S.data[k]||{},prv=pk?S.data[pk]||{}:{};
  // Übung + extraSets aus Vorwoche übernehmen wenn aktuelle Woche noch leer
  const cur={
    ...rawCur,
    exercise: rawCur.exercise!==undefined ? rawCur.exercise : (prv.exercise||''),
    extraSets: rawCur.extraSets!==undefined ? rawCur.extraSets : (prv.extraSets||0),
  };
  // Tipp-Key: übungsbasiert – gilt für alle Wochen/Tage/Zyklen
  const tk=cur.exercise?'tip__ex__'+cur.exercise:mkt(S.cy,S.week,di,ei);
  const xs=cur.extraSets||0;
  const autoX=autoExtraSets(di,ei,ex.s);
  const ms=Math.min(5,ex.s+xs+autoX);
  const autoTriggered=autoX>0&&xs===0;
  const reps=cur.reps||Array(ms).fill('');
  const col=CC[ex.c]||'#aaa';
  const p=S.week>1?prog(reps,prv.reps||[],cur.weight,prv.weight):null;
  const dropOpen=S.drop&&S.drop.di===di&&S.drop.ei===ei;
  const opts=EXERCISES[ex.c]||[];
  const filt=S.dropSearch?opts.filter(o=>o.toLowerCase().includes(S.dropSearch.toLowerCase())):opts;

  // dropdown html

    dh='<div class="dropdown" id="dd-'+di+'-'+ei+'" style="border:1px solid '+col+'55"><div class="drop-search"><input id="ds-'+di+'-'+ei+'" type="text" placeholder="Suchen…" value="'+esc(S.dropSearch)+'" oninput="onDS('+di+','+ei+',this.value)"/></div><div class="drop-list">'+oh+'</div></div>';

      }else{
        tipH+='<div class="tip-panel"><p class="tip-text">'+(tip?esc(tip):'<span style="color:#555">Noch kein Tipp.</span>')+'</p><button class="tip-edit-btn" onclick="edTip(\''+slotKey+'\')">&#9998; Bearbeiten</button></div>';
      }
    }

  }

  // reps + +/- buttons

    +'<div class="ex-meta"><span class="sets-info">'+ms+' Sätze · <span style="color:'+col+'">'+ex.r[0]+'–'+ex.r[1]+' Reps</span>'+autoLabel+'</span>'
    +'<div class="w-wrap"><span class="w-label">Gewicht:</span><input class="w-input" type="text" value="'+esc(cur.weight||'')+'" placeholder="kg" onchange="updW('+di+','+ei+',this.value)"/>'+(prv.weight?'<span style="color:#555;font-size:11px">(VW: '+esc(prv.weight)+')</span>':'')+'</div></div>'
    +'<div class="reps-row">'+rh+'</div>'+hint+tipH+'</div>';
}

function renderOv(){
  const pl=plan();let h='<h2 class="ov-title">Fortschritts-Übersicht</h2><p class="ov-sub">Gewichtsentwicklung pro Übung über alle 12 Wochen.</p>';
  pl.forEach((day,di)=>{
    h+='<div class="ov-day"><div class="ov-day-lbl">'+esc(day.l)+'</div>';
    day.e.forEach((ex,ei)=>{
      const ws=Array.from({length:12},(_,i)=>{const d=S.data[mk(S.cy,i+1,di,ei)]||{};return{w:i+1,name:d.exercise,wt:parseFloat(d.weight)||0}});
      const filled=ws.filter(x=>x.wt>0),name=(ws.find(x=>x.name)||{}).name,nums=ws.map(x=>x.wt),mx=Math.max(...nums,1);
      const col=CC[ex.c]||'#aaa',gain=filled.length>=2?filled[filled.length-1].wt-filled[0].wt:null;
      const bars=nums.map((v,i)=>'<div class="ov-bar" title="W'+(i+1)+': '+(v||'–')+' kg" style="height:'+Math.max(2,v>0?(v/mx*36):2)+'px;background:'+(v>0?col:'rgba(255,255,255,0.08)')+'"></div>').join('');
      h+='<div class="ov-ex" style="border-left:3px solid '+col+'"><div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px"><span style="font-weight:700">'+(name||'<span style="color:#555">—</span>')+'</span><div style="display:flex;gap:12px;align-items:center"><span style="color:'+col+';font-size:11px">'+esc(ex.c)+'</span>'+(gain&&gain>0?'<span style="color:#7bc47a;font-weight:700">+'+gain.toFixed(1)+' kg</span>':'')+'</div></div><div class="ov-bars">'+bars+'</div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:10px;color:#555">W1</span><span style="font-size:10px;color:#555">W12</span></div>'+(filled.length?'<div style="font-size:11px;color:#777;margin-top:4px">Start: <b style="color:#fff">'+filled[0].wt+' kg</b>'+(filled.length>1?' · Aktuell: <b style="color:#7bc47a">'+filled[filled.length-1].wt+' kg</b>':'')+'</div>':'')+'</div>';
    });
    h+='</div>';
  });
  document.getElementById('view-overview').innerHTML=h;
}

// ACTIONS
function setView(v){S.view=v;render()}
function setPlan(p){S.pt=Number(p);render()}
function setCycle(c){S.cy=c;render()}
function changeWeek(d){S.week=Math.max(1,Math.min(12,S.week+d));render()}
function toggleDay(di){S.openDays[di]=S.openDays[di]!==false?false:true;render()}

function togDrop(di,ei,ev){
  ev.stopPropagation();
  if(S.drop&&S.drop.di===di&&S.drop.ei===ei){S.drop=null}else{S.drop={di,ei};S.dropSearch=''}
  renderT();
  if(S.drop){setTimeout(()=>{
    const el=document.getElementById('ds-'+di+'-'+ei);
    if(el)el.focus();
    const dd=document.getElementById('dd-'+di+'-'+ei);
    const pw=document.getElementById('pw-'+di+'-'+ei);
    if(dd&&pw){const r=pw.getBoundingClientRect();if(window.innerHeight-r.bottom<280){dd.style.bottom='calc(100% + 4px)';dd.style.top='auto'}}
  },20)}
}
function onDS(di,ei,v){S.dropSearch=v;renderT()}
function selEx(di,ei,v){
  const k=initKey(di,ei);
  S.data[k]={...S.data[k],exercise:v};save();
  S.drop=null;S.dropSearch='';renderT();
}
function initKey(di,ei){
  const k=mk(S.cy,S.week,di,ei);
  if(!S.data[k]){
    const pk=S.week>1?mk(S.cy,S.week-1,di,ei):null;
    const prv=pk?(S.data[pk]||{}):{};
    S.data[k]={exercise:prv.exercise||'',extraSets:prv.extraSets||0};
  }
  return k;
}
function updW(di,ei,v){const k=initKey(di,ei);S.data[k]={...S.data[k],weight:v};save()}
function updRep(di,ei,i,v){
  const k=initKey(di,ei);const cur=S.data[k];
  const ms=Math.min(5,(cur.extraSets||0)+(plan()[di].e[ei].s));
  const r=[...(cur.reps||Array(ms).fill(''))];while(r.length<=i)r.push('');r[i]=v;
  S.data[k]={...cur,reps:r};save();
}
function addSet(di,ei){const k=initKey(di,ei);S.data[k]={...S.data[k],extraSets:(S.data[k].extraSets||0)+1};save();renderT()}
function removeSet(di,ei){const k=initKey(di,ei);S.data[k]={...S.data[k],extraSets:Math.max(0,(S.data[k].extraSets||0)-1)};save();renderT()}
function togTip(tk){S.tips[tk]=!S.tips[tk];if(!S.tips[tk])S.tipEdit[tk]=false;renderT()}
function edTip(tk){S.tipEdit[tk]=true;renderT()}
function canTip(tk){S.tipEdit[tk]=false;renderT()}
function savTip(tk,tid,sk){const el=document.getElementById(tid);if(el){S.data[tk]=el.value;save()}S.tipEdit[sk]=false;renderT()}
function resTip(tk,sk){delete S.data[tk];save();S.tipEdit[sk]=false;renderT()}

document.addEventListener('click',e=>{
  if(S.drop&&!e.target.closest('.picker-wrap')){S.drop=null;renderT()}
});

render();
</script>
</body>
</html>
